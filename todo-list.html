var savedBibleOpen = localStorage.getItem('bibleAudioOpen');
if (savedBibleOpen === 'true') {
  toggleBibleAudio();
}

// Embedded Mark chapters (BSB)
var MARK_CHAPTERS = [["This is the beginning of the gospel of Jesus Christ, the Son of God.","As it is written in Isaiah the prophet: \u201cBehold, I will send My messenger ahead of You, who will prepare Your way.\u201d","\u201cA voice of one calling in the wilderness, \u2018Prepare the way for the Lord, make straight paths for Him.\u2019\u201d","John the Baptist appeared in the wilderness, preaching a baptism of repentance for the forgiveness of sins.","People went out to him from all of Jerusalem and the countryside of Judea. Confessing their sins, they were baptized by him in the Jordan River.","John was clothed in camel\u2019s hair, with a leather belt around his waist. His food was locusts and wild honey.","And he proclaimed: \u201cAfter me will come One more powerful than I, the straps of whose sandals I am not worthy to stoop down and untie.","I baptize you with water, but He will baptize you with the Holy Spirit.\u201d","In those days Jesus came from Nazareth in Galilee and was baptized by John in the Jordan.","As soon as Jesus came up out of the water, He saw the heavens breaking open and the Spirit descending on Him like a dove.","And a voice came from heaven: \u201cYou are My beloved Son; in You I am well pleased.\u201d","At once the Spirit drove Jesus into the wilderness,","and He was there for forty days, being tempted by Satan. He was with the wild animals, and the angels ministered to Him.","After the arrest of John, Jesus went into Galilee and proclaimed the gospel of God.","\u201cThe time is fulfilled,\u201d He said, \u201cand the kingdom of God is near. Repent and believe in the gospel!\u201d","As Jesus was walking beside the Sea of Galilee, He saw Simon and his brother Andrew. They were casting a net into the sea, for they were fishermen.","\u201cCome, follow Me,\u201d Jesus said, \u201cand I will make you fishers of men.\u201d","And at once they left their nets and followed Him.","Going on a little farther, He saw James son of Zebedee and his brother John. They were in a boat, mending their nets.","Immediately Jesus called them, and they left their father Zebedee in the boat with the hired men and followed Him.","Then Jesus and His companions went to Capernaum, and right away Jesus entered the synagogue on the Sabbath and began to teach.","The people were astonished at His teaching, because He taught as one who had authority, and not as the scribes.","Suddenly a man with an unclean spirit cried out in the synagogue:","\u201cWhat do You want with us, Jesus of Nazareth? Have You come to destroy us? I know who You are\u2014the Holy One of God!\u201d","But Jesus rebuked the spirit. \u201cBe silent!\u201d He said. \u201cCome out of him!\u201d","At this, the unclean spirit threw the man into convulsions and came out with a loud shriek.","All the people were amazed and began to ask one another, \u201cWhat is this? A new teaching with authority! He commands even the unclean spirits, and they obey Him!\u201d","And the news about Jesus spread quickly through the whole region of Galilee.","As soon as Jesus and His companions had left the synagogue, they went with James and John to the home of Simon and Andrew.","Simon\u2019s mother-in-law was sick in bed with a fever, and they promptly told Jesus about her.","So He went to her, took her by the hand, and helped her up. The fever left her, and she began to serve them.","That evening, after sunset, people brought to Jesus all the sick and demon-possessed,","and the whole town gathered at the door.","And He healed many who were ill with various diseases and drove out many demons. But He would not allow the demons to speak, because they knew who He was.","Early in the morning, while it was still dark, Jesus got up and went out to a solitary place to pray.","Simon and his companions went to look for Him,","and when they found Him, they said, \u201cEveryone is looking for You!\u201d","But Jesus answered, \u201cLet us go on to the neighboring towns so I can preach there as well, for that is why I have come.\u201d","So He went throughout Galilee, preaching in their synagogues and driving out demons.","Then a leper came to Jesus, begging on his knees: \u201cIf You are willing, You can make me clean.\u201d","Moved with compassion, Jesus reached out His hand and touched the man. \u201cI am willing,\u201d He said. \u201cBe clean!\u201d","And immediately the leprosy left him, and the man was cleansed.","Jesus promptly sent him away with a stern warning:","\u201cSee that you don\u2019t tell anyone. But go, show yourself to the priest and present the offering Moses prescribed for your cleansing, as a testimony to them.\u201d","But the man went out and openly began to proclaim and spread the news. Consequently, Jesus could no longer enter a town in plain view, but He stayed out in solitary places. Yet people came to Him from every quarter."],["A few days later Jesus went back to Capernaum. And when the people heard that He was home,","they gathered in such large numbers that there was no more room, not even outside the door, as Jesus spoke the word to them.","Then a paralytic was brought to Him, carried by four men.","Since they were unable to get to Jesus through the crowd, they uncovered the roof above Him, made an opening, and lowered the paralytic on his mat.","When Jesus saw their faith, He said to the paralytic, \u201cSon, your sins are forgiven.\u201d","But some of the scribes were sitting there and thinking in their hearts,","\u201cWhy does this man speak like this? He is blaspheming! Who can forgive sins but God alone?\u201d","At once Jesus knew in His spirit that they were thinking this way within themselves. \u201cWhy are you thinking these things in your hearts?\u201d He asked.","\u201cWhich is easier: to say to a paralytic, \u2018Your sins are forgiven,\u2019 or to say, \u2018Get up, pick up your mat, and walk\u2019?","But so that you may know that the Son of Man has authority on earth to forgive sins...\u201d He said to the paralytic,","\u201cI tell you, get up, pick up your mat, and go home.\u201d","And immediately the man got up, picked up his mat, and walked out in front of them all. As a result, they were all astounded and glorified God, saying, \u201cWe have never seen anything like this!\u201d","Once again Jesus went out beside the sea. All the people came to Him, and He taught them there.","As He was walking along, He saw Levi son of Alphaeus sitting at the tax booth. \u201cFollow Me,\u201d He told him, and Levi got up and followed Him.","While Jesus was dining at Levi\u2019s house, many tax collectors and sinners were eating with Him and His disciples\u2014for there were many who followed Him.","When the scribes who were Pharisees saw Jesus eating with these people, they asked His disciples, \u201cWhy does He eat with tax collectors and sinners?\u201d","On hearing this, Jesus told them, \u201cIt is not the healthy who need a doctor, but the sick. I have not come to call the righteous, but sinners.\u201d","Now John\u2019s disciples and the Pharisees were often fasting. So people came to Jesus and asked, \u201cWhy don\u2019t Your disciples fast like John\u2019s disciples and those of the Pharisees?\u201d","Jesus replied, \u201cHow can the guests of the bridegroom fast while He is with them? As long as He is with them, they cannot fast.","But the time will come when the bridegroom will be taken from them; then they will fast.","No one sews a patch of unshrunk cloth on an old garment. If he does, the new piece will pull away from the old, and a worse tear will result.","And no one pours new wine into old wineskins. If he does, the wine will burst the skins, and both the wine and the wineskins will be ruined. Instead, new wine is poured into new wineskins.\u201d","One Sabbath Jesus was passing through the grainfields, and His disciples began to pick the heads of grain as they walked along.","So the Pharisees said to Him, \u201cLook, why are they doing what is unlawful on the Sabbath?\u201d","Jesus replied, \u201cHave you never read what David did when he and his companions were hungry and in need?","During the high priesthood of Abiathar, he entered the house of God and ate the consecrated bread, which was lawful only for the priests. And he gave some to his companions as well.\u201d","Then Jesus declared, \u201cThe Sabbath was made for man, not man for the Sabbath.","Therefore, the Son of Man is Lord even of the Sabbath.\u201d"],["Once again Jesus entered the synagogue, and a man with a withered hand was there.","In order to accuse Jesus, they were watching to see if He would heal on the Sabbath.","Then Jesus said to the man with the withered hand, \u201cStand up among us.\u201d","And He asked them, \u201cWhich is lawful on the Sabbath: to do good or to do evil, to save life or to destroy it?\u201d But they were silent.","Jesus looked around at them with anger and sorrow at their hardness of heart. Then He said to the man, \u201cStretch out your hand.\u201d So he stretched it out, and it was restored.","At this, the Pharisees went out and began plotting with the Herodians how they might kill Jesus.","So Jesus withdrew with His disciples to the sea, accompanied by a large crowd from Galilee, Judea,","Jerusalem, Idumea, the region beyond the Jordan, and the vicinity of Tyre and Sidon. The large crowd came to Him when they heard what great things He was doing.","Jesus asked His disciples to have a boat ready for Him so that the crowd would not crush Him.","For He had healed so many that all who had diseases were pressing forward to touch Him.","And when the unclean spirits saw Him, they fell down before Him and cried out, \u201cYou are the Son of God!\u201d","But He warned them sternly not to make Him known.","Then Jesus went up on the mountain and called for those He wanted, and they came to Him.","He appointed twelve of them, whom He designated as apostles, to accompany Him, to be sent out to preach,","and to have authority to drive out demons.","These are the twelve He appointed: Simon (whom He named Peter),","James son of Zebedee and his brother John (whom He named Boanerges, meaning \u201cSons of Thunder\u201d),","Andrew, Philip, Bartholomew, Matthew, Thomas, James son of Alphaeus, Thaddaeus, Simon the Zealot,","and Judas Iscariot, who betrayed Jesus.","Then Jesus went home, and once again a crowd gathered, so that He and His disciples could not even eat.","When His family heard about this, they went out to take custody of Him, saying, \u201cHe is out of His mind.\u201d","And the scribes who had come down from Jerusalem were saying, \u201cHe is possessed by Beelzebul,\u201d and, \u201cBy the prince of the demons He drives out demons.\u201d","So Jesus called them together and began to speak to them in parables: \u201cHow can Satan drive out Satan?","If a kingdom is divided against itself, it cannot stand.","If a house is divided against itself, it cannot stand.","And if Satan is divided and rises against himself, he cannot stand; his end has come.","Indeed, no one can enter a strong man\u2019s house to steal his possessions unless he first ties up the strong man. Then he can plunder his house.","Truly I tell you, the sons of men will be forgiven all sins and blasphemies, as many as they utter.","But whoever blasphemes against the Holy Spirit will never be forgiven; he is guilty of eternal sin.\u201d","Jesus made this statement because they were saying, \u201cHe has an unclean spirit.\u201d","Then Jesus\u2019 mother and brothers came and stood outside. They sent someone in to summon Him,","and a crowd was sitting around Him. \u201cLook,\u201d He was told, \u201cYour mother and brothers are outside, asking for You.\u201d","But Jesus replied, \u201cWho are My mother and My brothers?\u201d","Looking at those seated in a circle around Him, He said, \u201cHere are My mother and My brothers!","For whoever does the will of God is My brother and sister and mother.\u201d"],["Once again Jesus began to teach beside the sea, and such a large crowd gathered around Him that He got into a boat and sat in it, while all the people crowded along the shore.","And He taught them many things in parables, and in His teaching He said,","\u201cListen! A farmer went out to sow his seed.","And as he was sowing, some seed fell along the path, and the birds came and devoured it.","Some fell on rocky ground, where it did not have much soil. It sprang up quickly because the soil was shallow.","But when the sun rose, the seedlings were scorched, and they withered because they had no root.","Other seed fell among thorns, which grew up and choked the seedlings, and they yielded no crop.","Still other seed fell on good soil, where it sprouted, grew up, and produced a crop\u2014one bearing thirtyfold, another sixtyfold, and another a hundredfold.\u201d","Then Jesus said, \u201cHe who has ears to hear, let him hear.\u201d","As soon as Jesus was alone with the Twelve and those around Him, they asked Him about the parable.","He replied, \u201cThe mystery of the kingdom of God has been given to you, but to those on the outside everything is expressed in parables,","so that, \u2018they may be ever seeing but never perceiving, and ever hearing but never understanding; otherwise they might turn and be forgiven.\u2019\u201d","Then Jesus said to them, \u201cDo you not understand this parable? Then how will you understand any of the parables?","The farmer sows the word.","Some are like the seeds along the path, where the word is sown. As soon as they hear it, Satan comes and takes away the word that was sown in them.","Some are like the seeds sown on rocky ground. They hear the word and at once receive it with joy.","But they themselves have no root, and they remain for only a season. When trouble or persecution comes because of the word, they quickly fall away.","Others are like the seeds sown among the thorns. They hear the word,","but the worries of this life, the deceitfulness of wealth, and the desire for other things come in and choke the word, and it becomes unfruitful.","Still others are like the seeds sown on good soil. They hear the word, receive it, and produce a crop\u2014thirtyfold, sixtyfold, or a hundredfold.\u201d","Jesus also said to them, \u201cDoes anyone bring in a lamp to put it under a basket or under a bed? Doesn\u2019t he set it on a stand?","For there is nothing hidden that will not be disclosed, and nothing concealed that will not be brought to light.","If anyone has ears to hear, let him hear.\u201d","He went on to say, \u201cPay attention to what you hear. With the measure you use, it will be measured to you, and even more will be added to you.","For whoever has will be given more. But whoever does not have, even what he has will be taken away from him.\u201d","Jesus also said, \u201cThe kingdom of God is like a man who scatters seed on the ground.","Night and day he sleeps and wakes, and the seed sprouts and grows, though he knows not how.","All by itself the earth produces a crop\u2014first the stalk, then the head, then grain that ripens within.","And as soon as the grain is ripe, he swings the sickle, because the harvest has come.\u201d","Then He asked, \u201cTo what can we compare the kingdom of God? With what parable shall we present it?","It is like a mustard seed, which is the smallest of all seeds sown upon the earth.","But after it is planted, it grows to be the largest of all garden plants and puts forth great branches, so that the birds of the air nest in its shade.\u201d","With many such parables Jesus spoke the word to them, to the extent that they could understand.","He did not tell them anything without using a parable. But privately He explained everything to His own disciples.","When that evening came, He said to His disciples, \u201cLet us cross to the other side.\u201d","After they had dismissed the crowd, they took Jesus with them, since He was already in the boat. And there were other boats with Him.","Soon a violent windstorm came up, and the waves were breaking over the boat, so that it was being swamped.","But Jesus was in the stern, sleeping on the cushion. So they woke Him and said, \u201cTeacher, don\u2019t You care that we are perishing?\u201d","Then Jesus got up and rebuked the wind and the sea. \u201cSilence!\u201d He commanded. \u201cBe still!\u201d And the wind died down, and it was perfectly calm.","\u201cWhy are you so afraid?\u201d He asked. \u201cDo you still have no faith?\u201d","Overwhelmed with fear, they asked one another, \u201cWho is this, that even the wind and the sea obey Him?\u201d"],["On the other side of the sea, they arrived in the region of the Gerasenes.","As soon as Jesus got out of the boat, He was met by a man with an unclean spirit, who was coming from the tombs.","This man had been living in the tombs and could no longer be restrained, even with chains.","Though he was often bound with chains and shackles, he had broken the chains and shattered the shackles. Now there was no one with the strength to subdue him.","Night and day in the tombs and in the mountains he kept crying out and cutting himself with stones.","When the man saw Jesus from a distance, he ran and fell on his knees before Him.","And he shouted in a loud voice, \u201cWhat do You want with me, Jesus, Son of the Most High God? I beg You before God not to torture me!\u201d","For Jesus had already declared, \u201cCome out of this man, you unclean spirit!\u201d","\u201cWhat is your name?\u201d Jesus asked. \u201cMy name is Legion,\u201d he replied, \u201cfor we are many.\u201d","And he begged Jesus repeatedly not to send them out of that region.","There on the nearby hillside a large herd of pigs was feeding.","So the demons begged Jesus, \u201cSend us to the pigs, so that we may enter them.\u201d","He gave them permission, and the unclean spirits came out and went into the pigs, and the herd of about two thousand rushed down the steep bank into the sea and drowned in the water.","Those tending the pigs ran off and reported this in the town and countryside, and the people went out to see what had happened.","When they came to Jesus, they saw the man who had been possessed by the legion of demons sitting there, clothed and in his right mind; and they were afraid.","Those who had seen it described what had happened to the demon-possessed man and also to the pigs.","And the people began to beg Jesus to leave their region.","As He was getting into the boat, the man who had been possessed by the demons begged to go with Him.","But Jesus would not allow him. \u201cGo home to your own people,\u201d He said, \u201cand tell them how much the Lord has done for you, and what mercy He has shown you.\u201d","So the man went away and began to proclaim throughout the Decapolis how much Jesus had done for him. And everyone was amazed.","When Jesus had again crossed by boat to the other side, a large crowd gathered around Him beside the sea.","A synagogue leader named Jairus arrived, and seeing Jesus, he fell at His feet","and pleaded with Him urgently, \u201cMy little daughter is near death. Please come and place Your hands on her, so that she will be healed and live.\u201d","So Jesus went with him, and a large crowd followed and pressed around Him.","And a woman was there who had suffered from bleeding for twelve years.","She had borne much agony under the care of many physicians and had spent all she had, but to no avail. Instead, her condition had only grown worse.","When the woman heard about Jesus, she came up through the crowd behind Him and touched His cloak.","For she kept saying, \u201cIf only I touch His garments, I will be healed.\u201d","Immediately her bleeding stopped, and she sensed in her body that she was healed of her affliction.","At once Jesus was aware that power had gone out from Him. Turning to the crowd, He asked, \u201cWho touched My garments?\u201d","His disciples answered, \u201cYou can see the crowd pressing in on You, and yet You ask, \u2018Who touched Me?\u2019\u201d","But He kept looking around to see who had done this.","Then the woman, knowing what had happened to her, came and fell down before Him trembling in fear, and she told Him the whole truth.","\u201cDaughter,\u201d said Jesus, \u201cyour faith has healed you. Go in peace and be free of your affliction.\u201d","While He was still speaking, messengers from the house of Jairus arrived and said, \u201cYour daughter is dead; why bother the Teacher anymore?\u201d","But Jesus overheard their conversation and said to Jairus, \u201cDo not be afraid; just believe.\u201d","And He did not allow anyone to accompany Him except Peter, James, and John the brother of James.","When they arrived at the house of the synagogue leader, Jesus saw the commotion and the people weeping and wailing loudly.","He went inside and asked, \u201cWhy all this commotion and weeping? The child is not dead, but asleep.\u201d","And they laughed at Him. After He had put them all outside, He took the child\u2019s father and mother and His own companions, and went in to see the child.","Taking her by the hand, Jesus said, \u201cTalitha koum!\u201d which means, \u201cLittle girl, I say to you, get up!\u201d","Immediately the girl got up and began to walk around (she was twelve years old). And at once they were utterly astounded.","Then Jesus gave strict orders that no one should know about this, and He told them to give her something to eat."],["Jesus went on from there and came to His hometown, accompanied by His disciples.","When the Sabbath came, He began to teach in the synagogue, and many who heard Him were astonished. \u201cWhere did this man get these ideas?\u201d they asked. \u201cWhat is this wisdom He has been given? And how can He perform such miracles?","Isn\u2019t this the carpenter, the son of Mary and the brother of James, Joses, Judas, and Simon? Aren\u2019t His sisters here with us as well?\u201d And they took offense at Him.","Then Jesus said to them, \u201cOnly in his hometown, among his relatives, and in his own household is a prophet without honor.\u201d","So He could not perform any miracles there, except to lay His hands on a few of the sick and heal them.","And He was amazed at their unbelief. And He went around from village to village, teaching the people.","Then Jesus called the Twelve to Him and began to send them out two by two, giving them authority over unclean spirits.","He instructed them to take nothing but a staff for the journey\u2014no bread, no bag, no money in their belts\u2014","and to wear sandals, but not a second tunic.","And He told them, \u201cWhen you enter a house, stay there until you leave that area.","If anyone will not welcome you or listen to you, shake the dust off your feet when you leave that place, as a testimony against them.\u201d","So they set out and preached that the people should repent.","They also drove out many demons and healed many of the sick, anointing them with oil.","Now King Herod heard about this, for Jesus\u2019 name had become well known, and people were saying, \u201cJohn the Baptist has risen from the dead! That is why miraculous powers are at work in him.\u201d","Others were saying, \u201cHe is Elijah,\u201d and still others, \u201cHe is a prophet, like one of the prophets of old.\u201d","But when Herod heard this, he said, \u201cJohn, whom I beheaded, has risen from the dead!\u201d","For Herod himself had ordered that John be arrested and bound and imprisoned, on account of his brother Philip\u2019s wife Herodias, whom Herod had married.","For John had been telling Herod, \u201cIt is not lawful for you to have your brother\u2019s wife!\u201d","So Herodias held a grudge against John and wanted to kill him. But she had been unable,","because Herod feared John and protected him, knowing that he was a righteous and holy man. When he heard John\u2019s words, he was greatly perplexed; yet he listened to him gladly.","On Herod\u2019s birthday, her opportunity arose. Herod held a banquet for his nobles and military commanders and the leading men of Galilee.","When the daughter of Herodias came and danced, she pleased Herod and his guests, and the king said to the girl, \u201cAsk me for whatever you wish, and I will give it to you.\u201d","And he swore to her, \u201cWhatever you ask of me, I will give you, up to half my kingdom!\u201d","Then she went out and asked her mother, \u201cWhat should I request?\u201d And her mother answered, \u201cThe head of John the Baptist.\u201d","At once the girl hurried back to the king with her request: \u201cI want you to give me the head of John the Baptist on a platter immediately.\u201d","The king was consumed with sorrow, but because of his oaths and his guests, he did not want to refuse her.","So without delay, the king commanded that John\u2019s head be brought in. He sent an executioner, who went and beheaded him in the prison.","The man brought John\u2019s head on a platter and presented it to the girl, who gave it to her mother.","When John\u2019s disciples heard about this, they came and took his body and placed it in a tomb.","Meanwhile, the apostles gathered around Jesus and brought Him news of all they had done and taught.","And He said to them, \u201cCome with Me privately to a solitary place, and let us rest for a while.\u201d For many people were coming and going, and they did not even have time to eat.","So they went away in a boat by themselves to a solitary place.","But many people saw them leaving and recognized them. They ran together on foot from all the towns and arrived before them.","When Jesus stepped ashore and saw a large crowd, He had compassion on them, because they were like sheep without a shepherd. And He began to teach them many things.","By now the hour was already late. So the disciples came to Jesus and said, \u201cThis is a desolate place, and the hour is already late.","Dismiss the crowd so they can go to the surrounding countryside and villages and buy themselves something to eat.\u201d","But Jesus told them, \u201cYou give them something to eat.\u201d They asked Him, \u201cShould we go out and spend two hundred denarii to give all of them bread to eat?\u201d","\u201cGo and see how many loaves you have,\u201d He told them. And after checking, they said, \u201cFive\u2014and two fish.\u201d","Then Jesus directed them to have the people sit in groups on the green grass.","So they sat down in groups of hundreds and fifties.","Taking the five loaves and the two fish and looking up to heaven, Jesus spoke a blessing and broke the loaves. Then He gave them to His disciples to set before the people. And He divided the two fish among them all.","They all ate and were satisfied,","and the disciples picked up twelve basketfuls of broken pieces of bread and fish.","And there were five thousand men who had eaten the loaves.","Immediately Jesus made His disciples get into the boat and go on ahead of Him to Bethsaida, while He dismissed the crowd.","After bidding them farewell, He went up on the mountain to pray.","When evening came, the boat was in the middle of the sea, and Jesus was alone on land.","He could see that the disciples were straining to row, because the wind was against them. About the fourth watch of the night, Jesus went out to them, walking on the sea. He intended to pass by them,","but when they saw Him walking on the sea, they cried out, thinking He was a ghost\u2014","for they all saw Him and were terrified. But Jesus spoke up at once: \u201cTake courage! It is I. Do not be afraid.\u201d","Then He climbed into the boat with them, and the wind died down. And the disciples were utterly astounded,","for they had not understood about the loaves, but their hearts had been hardened.","When they had crossed over, they landed at Gennesaret and moored the boat.","As soon as they got out of the boat, the people recognized Jesus","and ran through that whole region, carrying the sick on mats to wherever they heard He was.","And wherever He went\u2014villages and towns and countrysides\u2014they laid the sick in the marketplaces and begged Him just to let them touch the fringe of His cloak. And all who touched Him were healed."],["Then the Pharisees and some of the scribes who had come from Jerusalem gathered around Jesus,","and they saw some of His disciples eating with hands that were defiled\u2014that is, unwashed.","Now in holding to the tradition of the elders, the Pharisees and all the Jews do not eat until they wash their hands ceremonially.","And on returning from the market, they do not eat unless they wash. And there are many other traditions for them to observe, including the washing of cups, pitchers, kettles, and couches for dining.","So the Pharisees and scribes questioned Jesus: \u201cWhy do Your disciples not walk according to the tradition of the elders? Instead, they eat with defiled hands.\u201d","Jesus answered them, \u201cIsaiah prophesied correctly about you hypocrites, as it is written: \u2018These people honor Me with their lips, but their hearts are far from Me.","They worship Me in vain; they teach as doctrine the precepts of men.\u2019","You have disregarded the commandment of God to keep the tradition of men.\u201d","He went on to say, \u201cYou neatly set aside the command of God to maintain your own tradition.","For Moses said, \u2018Honor your father and your mother\u2019 and \u2018Anyone who curses his father or mother must be put to death.\u2019","But you say that if a man says to his father or mother, \u2018Whatever you would have received from me is Corban\u2019 (that is, a gift devoted to God),","he is no longer permitted to do anything for his father or mother.","Thus you nullify the word of God by the tradition you have handed down. And you do so in many such matters.\u201d","Once again Jesus called the crowd to Him and said, \u201cAll of you, listen to Me and understand:","Nothing that enters a man from the outside can defile him; but the things that come out of a man, these are what defile him.\u201d","","After Jesus had left the crowd and gone into the house, His disciples inquired about the parable.","\u201cAre you still so dull?\u201d He asked. \u201cDo you not understand? Nothing that enters a man from the outside can defile him,","because it does not enter his heart, but it goes into the stomach and then is eliminated.\u201d (Thus all foods are clean.)","He continued: \u201cWhat comes out of a man, that is what defiles him.","For from within the hearts of men come evil thoughts, sexual immorality, theft, murder, adultery,","greed, wickedness, deceit, debauchery, envy, slander, arrogance, and foolishness.","All these evils come from within, and these are what defile a man.\u201d","Jesus left that place and went to the region of Tyre. Not wanting anyone to know He was there, He entered a house, but was unable to escape their notice.","Instead, a woman whose little daughter had an unclean spirit soon heard about Jesus, and she came and fell at His feet.","Now she was a Greek woman of Syrophoenician origin, and she kept asking Jesus to drive the demon out of her daughter.","\u201cFirst let the children have their fill,\u201d He said. \u201cFor it is not right to take the children\u2019s bread and toss it to the dogs.\u201d","\u201cYes, Lord,\u201d she replied, \u201ceven the dogs under the table eat the children\u2019s crumbs.\u201d","Then Jesus told her, \u201cBecause of this answer, you may go. The demon has left your daughter.\u201d","And she went home and found her child lying on the bed, and the demon was gone.","Then Jesus left the region of Tyre and went through Sidon to the Sea of Galilee and into the region of the Decapolis.","Some people brought to Him a man who was deaf and hardly able to speak, and they begged Jesus to place His hand on him.","So Jesus took him aside privately, away from the crowd, and put His fingers into the man\u2019s ears. Then He spit and touched the man\u2019s tongue.","And looking up to heaven, He sighed deeply and said to him, \u201cEphphatha!\u201d (which means, \u201cBe opened!\u201d).","Immediately the man\u2019s ears were opened and his tongue was released, and he began to speak plainly.","Jesus ordered them not to tell anyone. But the more He ordered them, the more widely they proclaimed it.","The people were utterly astonished and said, \u201cHe has done all things well! He makes even the deaf hear and the mute speak!\u201d"],["In those days the crowd once again became very large, and they had nothing to eat. Jesus called the disciples to Him and said,","\u201cI have compassion for this crowd, because they have already been with Me three days and have nothing to eat.","If I send them home hungry, they will faint along the way. For some of them have come a great distance.\u201d","His disciples replied, \u201cWhere in this desolate place could anyone find enough bread to feed all these people?\u201d","\u201cHow many loaves do you have?\u201d Jesus asked. \u201cSeven,\u201d they replied.","And He instructed the crowd to sit down on the ground. Then He took the seven loaves, gave thanks and broke them, and gave them to His disciples to set before the people. And they distributed them to the crowd.","They also had a few small fish, and Jesus blessed them and ordered that these be set before them as well.","The people ate and were satisfied, and the disciples picked up seven basketfuls of broken pieces that were left over.","And about four thousand men were present. And when Jesus had dismissed the crowd,","He immediately got into the boat with His disciples and went to the district of Dalmanutha.","Then the Pharisees came and began to argue with Jesus, testing Him by demanding from Him a sign from heaven.","Jesus sighed deeply in His spirit and said, \u201cWhy does this generation demand a sign? Truly I tell you, no sign will be given to this generation.\u201d","And He left them, got back into the boat, and crossed to the other side.","Now the disciples had forgotten to take bread, except for one loaf they had with them in the boat.","\u201cWatch out!\u201d He cautioned them. \u201cBeware of the leaven of the Pharisees and of Herod.\u201d","So they began to discuss with one another the fact that they had no bread.","Aware of their conversation, Jesus asked them, \u201cWhy are you debating about having no bread? Do you still not see or understand? Do you have such hard hearts?","\u2018Having eyes, do you not see? And having ears, do you not hear?\u2019 And do you not remember?","When I broke the five loaves for the five thousand, how many basketfuls of broken pieces did you collect?\u201d \u201cTwelve,\u201d they answered.","\u201cAnd when I broke the seven loaves for the four thousand, how many basketfuls of broken pieces did you collect?\u201d \u201cSeven,\u201d they said.","Then He asked them, \u201cDo you still not understand?\u201d","When they arrived at Bethsaida, some people brought a blind man and begged Jesus to touch him.","So He took the blind man by the hand and led him out of the village. Then He spit on the man\u2019s eyes and placed His hands on him. \u201cCan you see anything?\u201d He asked.","The man looked up and said, \u201cI can see the people, but they look like trees walking around.\u201d","Once again Jesus placed His hands on the man\u2019s eyes, and when he opened them his sight was restored, and he could see everything clearly.","Jesus sent him home and said, \u201cDo not go back into the village.\u201d","Then Jesus and His disciples went on to the villages around Caesarea Philippi. On the way, He questioned His disciples: \u201cWho do people say I am?\u201d","They replied, \u201cSome say John the Baptist; others say Elijah; and still others, one of the prophets.\u201d","\u201cBut what about you?\u201d Jesus asked. \u201cWho do you say I am?\u201d Peter answered, \u201cYou are the Christ.\u201d","And Jesus warned them not to tell anyone about Him.","Then He began to teach them that the Son of Man must suffer many things and be rejected by the elders, chief priests, and scribes, and that He must be killed and after three days rise again.","He spoke this message quite frankly, and Peter took Him aside and began to rebuke Him.","But Jesus, turning and looking at His disciples, rebuked Peter and said, \u201cGet behind Me, Satan! For you do not have in mind the things of God, but the things of men.\u201d","Then Jesus called the crowd to Him along with His disciples, and He told them, \u201cIf anyone wants to come after Me, he must deny himself and take up his cross and follow Me.","For whoever wants to save his life will lose it, but whoever loses his life for My sake and for the gospel will save it.","What does it profit a man to gain the whole world, yet forfeit his soul?","Or what can a man give in exchange for his soul?","If anyone is ashamed of Me and My words in this adulterous and sinful generation, the Son of Man will also be ashamed of him when He comes in His Father\u2019s glory with the holy angels.\u201d"],["Then Jesus said to them, \u201cTruly I tell you, there are some standing here who will not taste death before they see the kingdom of God arrive with power.\u201d","After six days Jesus took with Him Peter, James, and John, and led them up a high mountain by themselves. There He was transfigured before them.","His clothes became radiantly white, brighter than any launderer on earth could bleach them.","And Elijah and Moses appeared before them, talking with Jesus.","Peter said to Jesus, \u201cRabbi, it is good for us to be here. Let us put up three shelters\u2014one for You, one for Moses, and one for Elijah.\u201d","For they were all so terrified that Peter did not know what else to say.","Then a cloud appeared and enveloped them, and a voice came from the cloud: \u201cThis is My beloved Son. Listen to Him!\u201d","Suddenly, when they looked around, they saw no one with them except Jesus.","As they were coming down the mountain, Jesus admonished them not to tell anyone what they had seen until the Son of Man had risen from the dead.","So they kept this matter to themselves, discussing what it meant to rise from the dead.","And they asked Jesus, \u201cWhy do the scribes say that Elijah must come first?\u201d","He replied, \u201cElijah does indeed come first, and he restores all things. Why then is it written that the Son of Man must suffer many things and be rejected?","But I tell you that Elijah has indeed come, and they have done to him whatever they wished, just as it is written about him.\u201d","When they returned to the other disciples, they saw a large crowd around them, and scribes arguing with them.","As soon as all the people saw Jesus, they were filled with awe and ran to greet Him.","\u201cWhat are you disputing with them?\u201d He asked.","Someone in the crowd replied, \u201cTeacher, I brought You my son, who has a spirit that makes him mute.","Whenever it seizes him, it throws him to the ground. He foams at the mouth, gnashes his teeth, and becomes rigid. I asked Your disciples to drive it out, but they were unable.\u201d","\u201cO unbelieving generation!\u201d Jesus replied. \u201cHow long must I remain with you? How long must I put up with you? Bring the boy to Me.\u201d","So they brought him, and seeing Jesus, the spirit immediately threw the boy into a convulsion. He fell to the ground and rolled around, foaming at the mouth.","Jesus asked the boy\u2019s father, \u201cHow long has this been with him?\u201d \u201cFrom childhood,\u201d he said.","\u201cIt often throws him into the fire or into the water, trying to kill him. But if You can do anything, have compassion on us and help us.\u201d","\u201cIf You can?\u201d echoed Jesus. \u201cAll things are possible to him who believes!\u201d","Immediately the boy\u2019s father cried out, \u201cI do believe; help my unbelief!\u201d","When Jesus saw that a crowd had come running, He rebuked the unclean spirit. \u201cYou deaf and mute spirit,\u201d He said, \u201cI command you to come out and never enter him again.\u201d","After shrieking and convulsing him violently, the spirit came out. The boy became like a corpse, so that many said, \u201cHe is dead.\u201d","But Jesus took him by the hand and helped him to his feet, and he stood up.","After Jesus had gone into the house, His disciples asked Him privately, \u201cWhy couldn\u2019t we drive it out?\u201d","Jesus answered, \u201cThis kind cannot come out, except by prayer.\u201d","Going on from there, they passed through Galilee. But Jesus did not want anyone to know,","because He was teaching His disciples. He told them, \u201cThe Son of Man will be delivered into the hands of men. They will kill Him, and after three days He will rise.\u201d","But they did not understand this statement, and they were afraid to ask Him about it.","Then they came to Capernaum. While Jesus was in the house, He asked them, \u201cWhat were you discussing on the way?\u201d","But they were silent, for on the way they had been arguing about which of them was the greatest.","Sitting down, Jesus called the Twelve and said, \u201cIf anyone wants to be first, he must be the last of all and the servant of all.\u201d","Then He had a little child stand among them. Taking the child in His arms, He said to them,","\u201cWhoever welcomes one of these little children in My name welcomes Me, and whoever welcomes Me welcomes not only Me, but the One who sent Me.\u201d","John said to Him, \u201cTeacher, we saw someone else driving out demons in Your name, and we tried to stop him, because he does not accompany us.\u201d","\u201cDo not stop him,\u201d Jesus replied. \u201cFor no one who performs a miracle in My name can turn around and speak evil of Me.","For whoever is not against us is for us.","Indeed, if anyone gives you even a cup of water because you bear the name of Christ, truly I tell you, he will never lose his reward.","But if anyone causes one of these little ones who believe in Me to stumble, it would be better for him to have a large millstone hung around his neck and to be thrown into the sea.","If your hand causes you to sin, cut it off. It is better for you to enter life crippled than to have two hands and go into hell, into the unquenchable fire.","","If your foot causes you to sin, cut it off. It is better for you to enter life lame than to have two feet and be thrown into hell.","","And if your eye causes you to sin, pluck it out. It is better for you to enter the kingdom of God with one eye than to have two eyes and be thrown into hell,","where \u2018their worm never dies, and the fire is never quenched.\u2019","For everyone will be salted with fire.","Salt is good, but if the salt loses its saltiness, with what will you season it? Have salt among yourselves, and be at peace with one another.\u201d"],["Then Jesus left that place and went into the region of Judea, beyond the Jordan. Again the crowds came to Him and He taught them, as was His custom.","Some Pharisees came to test Him. \u201cIs it lawful for a man to divorce his wife?\u201d they inquired.","\u201cWhat did Moses command you?\u201d He replied.","They answered, \u201cMoses permitted a man to write his wife a certificate of divorce and send her away.\u201d","But Jesus told them, \u201cMoses wrote this commandment for you because of your hardness of heart.","However, from the beginning of creation, \u2018God made them male and female.\u2019","\u2018For this reason a man will leave his father and mother and be united to his wife,","and the two will become one flesh.\u2019 So they are no longer two, but one flesh.","Therefore what God has joined together, let man not separate.\u201d","When they were back inside the house, the disciples asked Jesus about this matter.","So He told them, \u201cWhoever divorces his wife and marries another woman commits adultery against her.","And if a woman divorces her husband and marries another man, she commits adultery.\u201d","Now people were bringing the little children to Jesus for Him to place His hands on them, and the disciples rebuked those who brought them.","But when Jesus saw this, He was indignant and told them, \u201cLet the little children come to Me, and do not hinder them! For the kingdom of God belongs to such as these.","Truly I tell you, anyone who does not receive the kingdom of God like a little child will never enter it.\u201d","And He took the children in His arms, placed His hands on them, and blessed them.","As Jesus started on His way, a man ran up and knelt before Him. \u201cGood Teacher,\u201d he asked, \u201cwhat must I do to inherit eternal life?\u201d","\u201cWhy do you call Me good?\u201d Jesus replied. \u201cNo one is good except God alone.","You know the commandments: \u2018Do not murder, do not commit adultery, do not steal, do not bear false witness, do not cheat others, honor your father and mother.\u2019\u201d","\u201cTeacher,\u201d he replied, \u201call these I have kept from my youth.\u201d","Jesus looked at him, loved him, and said to him, \u201cThere is one thing you lack: Go, sell everything you own and give to the poor, and you will have treasure in heaven. Then come, follow Me.\u201d","But the man was saddened by these words and went away in sorrow, because he had great wealth.","Then Jesus looked around and said to His disciples, \u201cHow hard it is for the rich to enter the kingdom of God!\u201d","And the disciples were amazed at His words. But Jesus said to them again, \u201cChildren, how hard it is to enter the kingdom of God!","It is easier for a camel to pass through the eye of a needle than for a rich man to enter the kingdom of God.\u201d","They were even more astonished and said to one another, \u201cWho then can be saved?\u201d","Jesus looked at them and said, \u201cWith man this is impossible, but not with God. For all things are possible with God.\u201d","Peter began to say to Him, \u201cLook, we have left everything and followed You.\u201d","\u201cTruly I tell you,\u201d Jesus replied, \u201cno one who has left home or brothers or sisters or mother or father or children or fields for My sake and for the gospel","will fail to receive a hundredfold in the present age\u2014houses and brothers and sisters and mothers and children and fields, along with persecutions\u2014and in the age to come, eternal life.","But many who are first will be last, and the last will be first.\u201d","As they were going up the road to Jerusalem, Jesus was walking ahead of them. The disciples were amazed, but those who followed were afraid. Again Jesus took the Twelve aside and began to tell them what was going to happen to Him:","\u201cLook, we are going up to Jerusalem, and the Son of Man will be delivered over to the chief priests and scribes. They will condemn Him to death and will deliver Him over to the Gentiles,","who will mock Him and spit on Him and flog Him and kill Him. And after three days He will rise again.\u201d","Then James and John, the sons of Zebedee, came to Jesus and declared, \u201cTeacher, we want You to do for us whatever we ask.\u201d","\u201cWhat do you want Me to do for you?\u201d He inquired.","They answered, \u201cGrant that one of us may sit at Your right hand and the other at Your left in Your glory.\u201d","\u201cYou do not know what you are asking,\u201d Jesus replied. \u201cCan you drink the cup I will drink, or be baptized with the baptism I will undergo?\u201d","\u201cWe can,\u201d the brothers answered. \u201cYou will drink the cup that I drink,\u201d Jesus said, \u201cand you will be baptized with the baptism that I undergo.","But to sit at My right or left is not Mine to grant. These seats belong to those for whom they have been prepared.\u201d","When the ten heard about this, they became indignant with James and John.","So Jesus called them together and said, \u201cYou know that those regarded as rulers of the Gentiles lord it over them, and their superiors exercise authority over them.","But it shall not be this way among you. Instead, whoever wants to become great among you must be your servant,","and whoever wants to be first must be the slave of all.","For even the Son of Man did not come to be served, but to serve, and to give His life as a ransom for many.\u201d","Next, they came to Jericho. And as Jesus and His disciples were leaving Jericho with a large crowd, a blind beggar named Bartimaeus, the son of Timaeus, was sitting beside the road.","When he heard that it was Jesus of Nazareth, he began to cry out, \u201cJesus, Son of David, have mercy on me!\u201d","Many people admonished him to be silent, but he cried out all the louder, \u201cSon of David, have mercy on me!\u201d","Jesus stopped and said, \u201cCall him.\u201d So they called the blind man. \u201cTake courage!\u201d they said. \u201cGet up! He is calling for you.\u201d","Throwing off his cloak, Bartimaeus jumped up and came to Jesus.","\u201cWhat do you want Me to do for you?\u201d Jesus asked. \u201cRabboni,\u201d said the blind man, \u201clet me see again.\u201d","\u201cGo,\u201d said Jesus, \u201cyour faith has healed you.\u201d And immediately he received his sight and followed Jesus along the road."],["As they approached Jerusalem and came to Bethphage and Bethany at the Mount of Olives, Jesus sent out two of His disciples","and said to them, \u201cGo into the village ahead of you, and as soon as you enter it, you will find a colt tied there, on which no one has ever sat. Untie it and bring it here.","If anyone asks, \u2018Why are you doing this?\u2019 tell him, \u2018The Lord needs it and will return it shortly.\u2019\u201d","So they went and found the colt outside in the street, tied at a doorway. They untied it,","and some who were standing there asked, \u201cWhy are you untying the colt?\u201d","The disciples answered as Jesus had instructed them, and the people gave them permission.","Then they led the colt to Jesus and threw their cloaks over it, and He sat on it.","Many in the crowd spread their cloaks on the road, while others spread branches they had cut from the fields.","The ones who went ahead and those who followed were shouting: \u201cHosanna!\u201d \u201cBlessed is He who comes in the name of the Lord!\u201d","\u201cBlessed is the coming kingdom of our father David!\u201d \u201cHosanna in the highest!\u201d","Then Jesus entered Jerusalem and went into the temple courts. He looked around at everything, but since it was already late, He went out to Bethany with the Twelve.","The next day, when they had left Bethany, Jesus was hungry.","Seeing in the distance a fig tree in leaf, He went to see if there was any fruit on it. But when He reached it, He found nothing on it except leaves, since it was not the season for figs.","Then He said to the tree, \u201cMay no one ever eat of your fruit again.\u201d And His disciples heard this statement.","When they arrived in Jerusalem, Jesus entered the temple courts and began to drive out those who were buying and selling there. He overturned the tables of the money changers and the seats of those selling doves.","And He would not allow anyone to carry merchandise through the temple courts.","Then Jesus began to teach them, and He declared, \u201cIs it not written: \u2018My house will be called a house of prayer for all the nations\u2019? But you have made it \u2018a den of robbers.\u2019\u201d","When the chief priests and scribes heard this, they looked for a way to kill Him. For they were afraid of Him, because the whole crowd was astonished at His teaching.","And when evening came, Jesus and His disciples went out of the city.","As they were walking back in the morning, they saw the fig tree withered from its roots.","Peter remembered it and said, \u201cLook, Rabbi! The fig tree You cursed has withered.\u201d","\u201cHave faith in God,\u201d Jesus said to them.","\u201cTruly I tell you that if anyone says to this mountain, \u2018Be lifted up and thrown into the sea,\u2019 and has no doubt in his heart but believes that it will happen, it will be done for him.","Therefore I tell you, whatever you ask for in prayer, believe that you have received it, and it will be yours.","And when you stand to pray, if you hold anything against another, forgive it, so that your Father in heaven will forgive your trespasses as well.\u201d","","After their return to Jerusalem, Jesus was walking in the temple courts, and the chief priests, scribes, and elders came up to Him.","\u201cBy what authority are You doing these things?\u201d they asked. \u201cAnd who gave You the authority to do them?\u201d","\u201cI will ask you one question,\u201d Jesus replied, \u201cand if you answer Me, I will tell you by what authority I am doing these things.","John\u2019s baptism\u2014was it from heaven or from men? Answer Me!\u201d","They deliberated among themselves what they should answer: \u201cIf we say, \u2018From heaven,\u2019 He will ask, \u2018Why then did you not believe him?\u2019","But if we say, \u2018From men\u2019...\u201d they were afraid of the people, for they all held that John truly was a prophet.","So they answered, \u201cWe do not know.\u201d And Jesus replied, \u201cNeither will I tell you by what authority I am doing these things.\u201d"],["Then Jesus began to speak to them in parables: \u201cA man planted a vineyard. He put a wall around it, dug a wine vat, and built a watchtower. Then he rented it out to some tenants and went away on a journey.","At harvest time, he sent a servant to the tenants to collect his share of the fruit of the vineyard.","But they seized the servant, beat him, and sent him away empty-handed.","Then he sent them another servant, and they struck him over the head and treated him shamefully.","He sent still another, and this one they killed. He sent many others; some they beat and others they killed.","Finally, having one beloved son, he sent him to them. \u2018They will respect my son,\u2019 he said.","But the tenants said to one another, \u2018This is the heir. Come, let us kill him, and the inheritance will be ours.\u2019","So they seized the son, killed him, and threw him out of the vineyard.","What then will the owner of the vineyard do? He will come and kill those tenants and give the vineyard to others.","Have you never read this Scripture: \u2018The stone the builders rejected has become the cornerstone.","This is from the Lord, and it is marvelous in our eyes\u2019?\u201d","At this, the leaders sought to arrest Jesus, for they knew that He had spoken this parable against them. But fearing the crowd, they left Him and went away.","Later, they sent some of the Pharisees and Herodians to catch Jesus in His words.","\u201cTeacher,\u201d they said, \u201cwe know that You are honest and seek favor from no one. Indeed, You are impartial and teach the way of God in accordance with the truth. Is it lawful to pay taxes to Caesar or not? Should we pay them or not?\u201d","But Jesus saw through their hypocrisy and said, \u201cWhy are you testing Me? Bring Me a denarius to inspect.\u201d","So they brought it, and He asked them, \u201cWhose image is this? And whose inscription?\u201d \u201cCaesar\u2019s,\u201d they answered.","Then Jesus told them, \u201cGive to Caesar what is Caesar\u2019s, and to God what is God\u2019s.\u201d And they marveled at Him.","Then the Sadducees, who say there is no resurrection, came to Jesus and questioned Him:","\u201cTeacher, Moses wrote for us that if a man\u2019s brother dies and leaves a wife but no children, the man is to marry his brother\u2019s widow and raise up offspring for him.","Now there were seven brothers. The first one married and died, leaving no children.","Then the second one married the widow, but he also died and left no children. And the third did likewise.","In this way, none of the seven left any children. And last of all, the woman died.","In the resurrection, then, whose wife will she be? For all seven were married to her.\u201d","Jesus said to them, \u201cAren\u2019t you mistaken, because you do not know the Scriptures or the power of God?","When the dead rise, they will neither marry nor be given in marriage. Instead, they will be like the angels in heaven.","But concerning the dead rising, have you not read about the burning bush in the Book of Moses, how God told him, \u2018I am the God of Abraham, the God of Isaac, and the God of Jacob\u2019?","He is not the God of the dead, but of the living. You are badly mistaken!\u201d","Now one of the scribes had come up and heard their debate. Noticing how well Jesus had answered them, he asked Him, \u201cWhich commandment is the most important of all?\u201d","Jesus replied, \u201cThis is the most important: \u2018Hear, O Israel, the Lord our God, the Lord is One.","Love the Lord your God with all your heart and with all your soul and with all your mind and with all your strength.\u2019","The second is this: \u2018Love your neighbor as yourself.\u2019 No other commandment is greater than these.\u201d","\u201cRight, Teacher,\u201d the scribe replied. \u201cYou have stated correctly that God is One and there is no other but Him,","and to love Him with all your heart and with all your understanding and with all your strength, and to love your neighbor as yourself. This is more important than all burnt offerings and sacrifices.\u201d","When Jesus saw that the man had answered wisely, He said, \u201cYou are not far from the kingdom of God.\u201d And no one dared to question Him any further.","While Jesus was teaching in the temple courts, He asked, \u201cHow can the scribes say that the Christ is the Son of David?","Speaking by the Holy Spirit, David himself declared: \u2018The Lord said to my Lord, \u201cSit at My right hand until I put Your enemies under Your feet.\u201d\u2019","David himself calls Him \u2018Lord.\u2019 So how can He be David\u2019s son?\u201d And the large crowd listened to Him with delight.","In His teaching Jesus also said, \u201cWatch out for the scribes. They like to walk around in long robes, to receive greetings in the marketplaces,","and to have the chief seats in the synagogues and the places of honor at banquets.","They defraud widows of their houses, and for a show make lengthy prayers. These men will receive greater condemnation.\u201d","As Jesus was sitting opposite the treasury, He watched the crowd putting money into it. And many rich people put in large amounts.","Then one poor widow came and put in two small copper coins, which amounted to a small fraction of a denarius.","Jesus called His disciples to Him and said, \u201cTruly I tell you, this poor widow has put more than all the others into the treasury.","For they all contributed out of their surplus, but she out of her poverty has put in all she had to live on.\u201d"],["As Jesus was leaving the temple, one of His disciples said to Him, \u201cTeacher, look at the magnificent stones and buildings!\u201d","\u201cDo you see all these great buildings?\u201d Jesus replied. \u201cNot one stone here will be left on another; every one will be thrown down.\u201d","While Jesus was sitting on the Mount of Olives opposite the temple, Peter, James, John, and Andrew asked Him privately,","\u201cTell us, when will these things happen? And what will be the sign that they are about to be fulfilled?\u201d","Jesus began by telling them, \u201cSee to it that no one deceives you.","Many will come in My name, claiming, \u2018I am He,\u2019 and will deceive many.","When you hear of wars and rumors of wars, do not be alarmed. These things must happen, but the end is still to come.","Nation will rise against nation, and kingdom against kingdom. There will be earthquakes in various places, as well as famines. These are the beginning of birth pains.","So be on your guard. You will be delivered over to the councils and beaten in the synagogues. On My account you will stand before governors and kings as witnesses to them.","And the gospel must first be proclaimed to all the nations.","But when they arrest you and hand you over, do not worry beforehand what to say. Instead, speak whatever you are given at that time, for it will not be you speaking, but the Holy Spirit.","Brother will betray brother to death, and a father his child. Children will rise against their parents and have them put to death.","You will be hated by everyone because of My name, but the one who perseveres to the end will be saved.","So when you see the abomination of desolation standing where it should not be (let the reader understand), then let those who are in Judea flee to the mountains.","Let no one on the housetop go back inside to retrieve anything from his house.","And let no one in the field return for his cloak.","How miserable those days will be for pregnant and nursing mothers!","Pray that this will not occur in the winter.","For those will be days of tribulation unseen from the beginning of God\u2019s creation until now, and never to be seen again.","If the Lord had not cut short those days, nobody would be saved. But for the sake of the elect, whom He has chosen, He has cut them short.","At that time if anyone says to you, \u2018Look, here is the Christ!\u2019 or \u2018There He is!\u2019 do not believe it.","For false Christs and false prophets will appear and perform signs and wonders to deceive even the elect, if that were possible.","So be on your guard; I have told you everything in advance.","But in those days, after that tribulation: \u2018The sun will be darkened, and the moon will not give its light;","the stars will fall from the sky, and the powers of the heavens will be shaken.\u2019","At that time they will see the Son of Man coming in the clouds with great power and glory.","And He will send out the angels to gather His elect from the four winds, from the ends of the earth to the ends of heaven.","Now learn this lesson from the fig tree: As soon as its branches become tender and sprout leaves, you know that summer is near.","So also, when you see these things happening, know that He is near, right at the door.","Truly I tell you, this generation will not pass away until all these things have happened.","Heaven and earth will pass away, but My words will never pass away.","No one knows about that day or hour, not even the angels in heaven, nor the Son, but only the Father.","Be on your guard and stay alert! For you do not know when the appointed time will come.","It is like a man going on a journey who left his house, put each servant in charge of his own task, and instructed the doorkeeper to keep watch.","Therefore keep watch, because you do not know when the master of the house will return\u2014whether in the evening, at midnight, when the rooster crows, or in the morning.","Otherwise, he may arrive without notice and find you sleeping.","And what I say to you, I say to everyone: Keep watch!\u201d"],["Now the Passover and the Feast of Unleavened Bread were two days away, and the chief priests and scribes were looking for a covert way to arrest Jesus and kill Him.","\u201cBut not during the feast,\u201d they said, \u201cor there may be a riot among the people.\u201d","While Jesus was in Bethany reclining at the table in the home of Simon the Leper, a woman came with an alabaster jar of expensive perfume, made of pure nard. She broke open the jar and poured it on Jesus\u2019 head.","Some of those present, however, expressed their indignation to one another: \u201cWhy this waste of perfume?","It could have been sold for over three hundred denarii and the money given to the poor.\u201d And they scolded her.","But Jesus said, \u201cLeave her alone; why are you bothering her? She has done a beautiful deed to Me.","The poor you will always have with you, and you can help them whenever you want. But you will not always have Me.","She has done what she could to anoint My body in advance of My burial.","And truly I tell you, wherever the gospel is preached in all the world, what she has done will also be told in memory of her.\u201d","Then Judas Iscariot, one of the Twelve, went to the chief priests to betray Jesus to them.","They were delighted to hear this, and they promised to give him money. So Judas began to look for an opportunity to betray Jesus.","On the first day of the Feast of Unleavened Bread, when the Passover lamb was to be sacrificed, Jesus\u2019 disciples asked Him, \u201cWhere do You want us to prepare for You to eat the Passover?\u201d","So He sent two of His disciples and told them, \u201cGo into the city, and a man carrying a jug of water will meet you. Follow him,","and whichever house he enters, say to the owner, \u2018The Teacher asks: Where is My guest room, where I may eat the Passover with My disciples?\u2019","And he will show you a large upper room, furnished and ready. Make preparations for us there.\u201d","So the disciples left and went into the city, where they found everything as Jesus had described. And they prepared the Passover.","When evening came, Jesus arrived with the Twelve.","And while they were reclining and eating, Jesus said, \u201cTruly I tell you, one of you who is eating with Me will betray Me.\u201d","They began to be grieved and to ask Him one after another, \u201cSurely not I?\u201d","He answered, \u201cIt is one of the Twelve\u2014the one who is dipping his hand into the bowl with Me.","The Son of Man will go just as it is written about Him, but woe to that man by whom He is betrayed! It would be better for him if he had not been born.\u201d","While they were eating, Jesus took bread, spoke a blessing and broke it, and gave it to the disciples, saying, \u201cTake it; this is My body.\u201d","Then He took the cup, gave thanks, and gave it to them, and they all drank from it.","He said to them, \u201cThis is My blood of the covenant, which is poured out for many.","Truly I tell you, I will no longer drink of the fruit of the vine until that day when I drink it anew in the kingdom of God.\u201d","And when they had sung a hymn, they went out to the Mount of Olives.","Then Jesus said to them, \u201cYou will all fall away, for it is written: \u2018I will strike the Shepherd, and the sheep will be scattered.\u2019","But after I have risen, I will go ahead of you into Galilee.\u201d","Peter declared, \u201cEven if all fall away, I never will.\u201d","\u201cTruly I tell you,\u201d Jesus replied, \u201cthis very night, before the rooster crows twice, you will deny Me three times.\u201d","But Peter kept insisting, \u201cEven if I have to die with You, I will never deny You.\u201d And all the others said the same thing.","Then they came to a place called Gethsemane, and Jesus told His disciples, \u201cSit here while I pray.\u201d","He took with Him Peter, James, and John, and began to be deeply troubled and distressed.","Then He said to them, \u201cMy soul is consumed with sorrow to the point of death. Stay here and keep watch.\u201d","Going a little farther, He fell to the ground and prayed that, if it were possible, the hour would pass from Him.","\u201cAbba, Father,\u201d He said, \u201call things are possible for You. Take this cup from Me. Yet not what I will, but what You will.\u201d","Then Jesus returned and found them sleeping. \u201cSimon, are you asleep?\u201d He asked. \u201cWere you not able to keep watch for one hour?","Watch and pray so that you will not enter into temptation. For the spirit is willing, but the body is weak.\u201d","Again He went away and prayed, saying the same thing.","And again Jesus returned and found them sleeping, for their eyes were heavy. And they did not know what to answer Him.","When Jesus returned the third time, He said, \u201cAre you still sleeping and resting? That is enough! The hour has come. Look, the Son of Man is betrayed into the hands of sinners.","Rise, let us go. See, My betrayer is approaching!\u201d","While Jesus was still speaking, Judas, one of the Twelve, arrived, accompanied by a crowd armed with swords and clubs, sent from the chief priests, scribes, and elders.","Now the betrayer had arranged a signal with them: \u201cThe One I kiss is the man; arrest Him and lead Him away securely.\u201d","Going directly to Jesus, he said, \u201cRabbi!\u201d and kissed Him.","Then the men seized Jesus and arrested Him.","And one of the bystanders drew his sword and struck the servant of the high priest, cutting off his ear.","Jesus asked the crowd, \u201cHave you come out with swords and clubs to arrest Me as you would an outlaw?","Every day I was with you, teaching in the temple courts, and you did not arrest Me. But this has happened that the Scriptures would be fulfilled.\u201d","Then everyone deserted Him and fled.","One young man who had been following Jesus was wearing a linen cloth around his body. They caught hold of him,","but he pulled free of the linen cloth and ran away naked.","They led Jesus away to the high priest, and all the chief priests, elders, and scribes assembled.","Peter followed Him at a distance, right into the courtyard of the high priest. And he sat with the officers and warmed himself by the fire.","Now the chief priests and the whole Sanhedrin were seeking testimony against Jesus to put Him to death, but they did not find any.","For many bore false witness against Jesus, but their testimony was inconsistent.","Then some men stood up and testified falsely against Him:","\u201cWe heard Him say, \u2018I will destroy this man-made temple, and in three days I will build another that is made without hands.\u2019\u201d","But even their testimony was inconsistent.","So the high priest stood up before them and questioned Jesus, \u201cHave You no answer? What are these men testifying against You?\u201d","But Jesus remained silent and made no reply. Again the high priest questioned Him, \u201cAre You the Christ, the Son of the Blessed One?\u201d","\u201cI am,\u201d said Jesus, \u201cand you will see the Son of Man sitting at the right hand of Power and coming with the clouds of heaven.\u201d","At this, the high priest tore his clothes and declared, \u201cWhy do we need any more witnesses?","You have heard the blasphemy. What is your verdict?\u201d And they all condemned Him as deserving of death.","Then some of them began to spit on Him. They blindfolded Him, struck Him with their fists, and said to Him, \u201cProphesy!\u201d And the officers received Him with slaps in His face.","While Peter was in the courtyard below, one of the servant girls of the high priest came down","and saw him warming himself there. She looked at Peter and said, \u201cYou also were with Jesus the Nazarene.\u201d","But he denied it. \u201cI do not know or even understand what you are talking about,\u201d he said. Then he went out to the gateway, and the rooster crowed.","There the servant girl saw him and again said to those standing nearby, \u201cThis man is one of them.\u201d","But he denied it again. After a little while, those standing nearby said once more to Peter, \u201cSurely you are one of them, for you too are a Galilean.\u201d","But he began to curse and swear, \u201cI do not know this man of whom you speak!\u201d","And immediately the rooster crowed a second time. Then Peter remembered the word that Jesus had spoken to him: \u201cBefore the rooster crows twice, you will deny Me three times.\u201d And he broke down and wept."],["Early in the morning, the chief priests, elders, scribes, and the whole Sanhedrin devised a plan. They bound Jesus, led Him away, and handed Him over to Pilate.","So Pilate questioned Him, \u201cAre You the King of the Jews?\u201d \u201cYou have said so,\u201d Jesus replied.","And the chief priests began to accuse Him of many things.","Then Pilate questioned Him again, \u201cHave You no answer? Look how many charges they are bringing against You!\u201d","But to Pilate\u2019s amazement, Jesus made no further reply.","Now it was Pilate\u2019s custom at the feast to release to the people a prisoner of their choosing.","And a man named Barabbas was imprisoned with the rebels who had committed murder during the insurrection.","So the crowd went up and began asking Pilate to keep his custom.","\u201cDo you want me to release to you the King of the Jews?\u201d Pilate asked.","For he knew it was out of envy that the chief priests had handed Jesus over.","But the chief priests stirred up the crowd to have him release Barabbas to them instead.","So Pilate asked them again, \u201cWhat then do you want me to do with the One you call the King of the Jews?\u201d","And they shouted back, \u201cCrucify Him!\u201d","\u201cWhy?\u201d asked Pilate. \u201cWhat evil has He done?\u201d But they shouted all the louder, \u201cCrucify Him!\u201d","And wishing to satisfy the crowd, Pilate released Barabbas to them. But he had Jesus flogged, and handed Him over to be crucified.","Then the soldiers led Jesus away into the palace (that is, the Praetorium) and called the whole company together.","They dressed Him in a purple robe, twisted together a crown of thorns, and set it on His head.","And they began to salute Him: \u201cHail, King of the Jews!\u201d","They kept striking His head with a staff and spitting on Him. And they knelt down and bowed before Him.","After they had mocked Him, they removed the purple robe and put His own clothes back on Him. Then they led Him out to crucify Him.","Now Simon of Cyrene, the father of Alexander and Rufus, was passing by on his way in from the country, and the soldiers forced him to carry the cross of Jesus.","They brought Jesus to a place called Golgotha, which means The Place of the Skull.","There they offered Him wine mixed with myrrh, but He did not take it.","And they crucified Him. They also divided His garments by casting lots to decide what each of them would take.","It was the third hour when they crucified Him.","And the charge inscribed against Him read: THE KING OF THE JEWS.","Along with Jesus, they crucified two robbers, one on His right and one on His left.","","And those who passed by heaped abuse on Him, shaking their heads and saying, \u201cAha! You who are going to destroy the temple and rebuild it in three days,","come down from the cross and save Yourself!\u201d","In the same way, the chief priests and scribes mocked Him among themselves, saying, \u201cHe saved others, but He cannot save Himself!","Let the Christ, the King of Israel, come down now from the cross, so that we may see and believe!\u201d And even those who were crucified with Him berated Him.","From the sixth hour until the ninth hour darkness came over all the land.","At the ninth hour, Jesus cried out in a loud voice, \u201cEloi, Eloi, lema sabachthani?\u201d which means, \u201cMy God, My God, why have You forsaken Me?\u201d","When some of those standing nearby heard this, they said, \u201cBehold, He is calling Elijah.\u201d","And someone ran and filled a sponge with sour wine. He put it on a reed and held it up for Jesus to drink, saying, \u201cLeave Him alone. Let us see if Elijah comes to take Him down.\u201d","But Jesus let out a loud cry and breathed His last.","And the veil of the temple was torn in two from top to bottom.","When the centurion standing there in front of Jesus saw how He had breathed His last, he said, \u201cTruly this man was the Son of God!\u201d","And there were also women watching from a distance. Among them were Mary Magdalene, Mary the mother of James the younger and of Joses, and Salome.","These women had followed Jesus and ministered to Him while He was in Galilee, and there were many other women who had come up to Jerusalem with Him.","Now it was already evening. Since it was Preparation Day (that is, the day before the Sabbath),","Joseph of Arimathea, a prominent Council member who himself was waiting for the kingdom of God, boldly went to Pilate to ask for the body of Jesus.","Pilate was surprised to hear that Jesus was already dead, so he summoned the centurion to ask if this was so.","When Pilate had confirmed it with the centurion, he granted the body to Joseph.","So Joseph bought a linen cloth, took down the body of Jesus, wrapped it in the cloth, and placed it in a tomb that had been cut out of the rock. Then he rolled a stone against the entrance to the tomb.","Mary Magdalene and Mary the mother of Joseph saw where His body was placed."],["When the Sabbath was over, Mary Magdalene, Mary the mother of James, and Salome bought spices so they could go and anoint the body of Jesus.","Very early on the first day of the week, just after sunrise, they went to the tomb.","They were asking one another, \u201cWho will roll away the stone from the entrance of the tomb?\u201d","But when they looked up, they saw that the stone had been rolled away, even though it was extremely large.","When they entered the tomb, they saw a young man dressed in a white robe sitting on the right side, and they were alarmed.","But he said to them, \u201cDo not be alarmed. You are looking for Jesus the Nazarene, who was crucified. He has risen! He is not here! See the place where they put Him.","But go, tell His disciples and Peter, \u2018He is going ahead of you into Galilee. There you will see Him, just as He told you.\u2019\u201d","So the women left the tomb and ran away, trembling and bewildered. And in their fear they did not say a word to anyone.","Early on the first day of the week, after Jesus had risen, He appeared first to Mary Magdalene, from whom He had driven out seven demons.","She went and told those who had been with Him, who were mourning and weeping.","And when they heard that Jesus was alive and she had seen Him, they did not believe it.","After this, Jesus appeared in a different form to two of them as they walked along in the country.","And they went back and reported it to the rest, but they did not believe them either.","Later, as they were eating, Jesus appeared to the Eleven and rebuked them for their unbelief and hardness of heart, because they did not believe those who had seen Him after He had risen.","And He said to them, \u201cGo into all the world and preach the gospel to every creature.","Whoever believes and is baptized will be saved, but whoever does not believe will be condemned.","And these signs will accompany those who believe: In My name they will drive out demons; they will speak in new tongues;","they will pick up snakes with their hands, and if they drink any deadly poison, it will not harm them; they will lay their hands on the sick, and they will be made well.\u201d","After the Lord Jesus had spoken to them, He was taken up into heaven and sat down at the right hand of God.","And they went out and preached everywhere, and the Lord worked through them, confirming His word by the signs that accompanied it."]];
