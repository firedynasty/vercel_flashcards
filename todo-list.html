// Populate dropdown
corTimestamps.forEach(function(ts, i) {
  var opt = document.createElement('option');
  opt.value = i;
  var mins = Math.floor(ts.time / 60);
  var secs = ts.time % 60;
  opt.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs + ' - ' + ts.label;
  corChapterSelect.appendChild(opt);
});

function toggleCorAudio() {
  corAudioOpen = !corAudioOpen;
  document.getElementById('corAudioBody').classList.toggle('show', corAudioOpen);
  document.getElementById('corToggleArrow').classList.toggle('open', corAudioOpen);
  localStorage.setItem('corAudioOpen', corAudioOpen.toString());
}

function jumpToCorSection() {
  var idx = parseInt(corChapterSelect.value);
  corAudio.currentTime = corTimestamps[idx].time;
  corAudio.play();
  updateCorSection(idx);
}

function prevCorSection() {
  var idx = Math.max(0, currentCorSectionIdx - 1);
  corChapterSelect.value = idx;
  corAudio.currentTime = corTimestamps[idx].time;
  corAudio.play();
  updateCorSection(idx);
}

function nextCorSection() {
  var idx = Math.min(corTimestamps.length - 1, currentCorSectionIdx + 1);
  corChapterSelect.value = idx;
  corAudio.currentTime = corTimestamps[idx].time;
  corAudio.play();
  updateCorSection(idx);
}

function updateCorSection(idx) {
  currentCorSectionIdx = idx;
  corCurrentSectionEl.textContent = corTimestamps[idx].label;
  corChapterSelect.value = idx;
  showCorText(idx);
}

function showCorText(idx) {
  var ts = corTimestamps[idx];
  var chapterData = COR_CHAPTERS[ts.chapter - 1];
  var html = '<div class="section-heading">' + ts.label + '</div>';
  for (var v = ts.startVerse; v <= ts.endVerse && v <= chapterData.length; v++) {
    var verseText = chapterData[v - 1];
    if (verseText) {
      html += '<div class="verse"><span class="verse-num">' + v + '</span>' + escapeHtml(verseText) + '</div>';
    }
  }
  corTextDisplay.innerHTML = html;
  corTextDisplay.scrollTop = 0;
}

romTimestamps.forEach(function(ts, i) {
  var opt = document.createElement('option');
  opt.value = i;
  var mins = Math.floor(ts.time / 60);
  var secs = ts.time % 60;
  opt.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs + ' - ' + ts.label;
  romChapterSelect.appendChild(opt);
});

function toggleRomAudio() {
  romAudioOpen = !romAudioOpen;
  document.getElementById('romAudioBody').classList.toggle('show', romAudioOpen);
  document.getElementById('romToggleArrow').classList.toggle('open', romAudioOpen);
  localStorage.setItem('romAudioOpen', romAudioOpen.toString());
}

function jumpToRomSection() {
  var idx = parseInt(romChapterSelect.value);
  romAudio.currentTime = romTimestamps[idx].time;
  romAudio.play();
  updateRomSection(idx);
}
function prevRomSection() {
  var idx = Math.max(0, currentRomSectionIdx - 1);
  romChapterSelect.value = idx;
  romAudio.currentTime = romTimestamps[idx].time;
  romAudio.play();
  updateRomSection(idx);
}
function nextRomSection() {
  var idx = Math.min(romTimestamps.length - 1, currentRomSectionIdx + 1);
  romChapterSelect.value = idx;
  romAudio.currentTime = romTimestamps[idx].time;
  romAudio.play();
  updateRomSection(idx);
}
function updateRomSection(idx) {
  currentRomSectionIdx = idx;
  romCurrentSectionEl.textContent = romTimestamps[idx].label;
  romChapterSelect.value = idx;
  showRomText(idx);
}
function showRomText(idx) {
  var ts = romTimestamps[idx];
  var chapterData = ROM_CHAPTERS[ts.chapter - 1];
  var html = '<div class="section-heading">' + ts.label + '</div>';
  for (var v = ts.startVerse; v <= ts.endVerse && v <= chapterData.length; v++) {
    var verseText = chapterData[v - 1];
    if (verseText) {
      html += '<div class="verse"><span class="verse-num">' + v + '</span>' + escapeHtml(verseText) + '</div>';
    }
  }
  romTextDisplay.innerHTML = html;
  romTextDisplay.scrollTop = 0;
}

hen the commandment came, sin revived, and I died.", "And the commandment, which  to life, I found  unto death.", "For sin, taking occasion by the commandment, deceived me, and by it slew .", "Wherefore the law  holy, and the commandment holy, and just, and good.", "Was then that which is good made death unto me? God forbid. But sin, that it might appear sin, working death in me by that which is good; that sin by the commandment might become exceeding sinful.", "For we know that the law is spiritual: but I am carnal, sold under sin.", "For that which I do I allow not: for what I would, that do I not; but what I hate, that do I.", "If then I do that which I would not, I consent unto the law that  good.", "Now then it is no more I that do it, but sin that dwelleth in me.", "For I know that in me (that is, in my flesh,) dwelleth no good thing: for to will is present with me; but  to perform that which is good I find not.", "For the good that I would I do not: but the evil which I would not, that I do.", "Now if I do that I would not, it is no more I that do it, but sin that dwelleth in me.", "I find then a law, that, when I would do good, evil is present with me.", "For I delight in the law of God after the inward man:", "But I see another law in my members, warring against the law of my mind, and bringing me into captivity to the law of sin which is in my members.", "O wretched man that I am! who shall deliver me from the body of this death?", "I thank God through Jesus Christ our Lord. So then with the mind I myself serve the law of God; but with the flesh the law of sin."], ["therefore now no condemnation to them which are in Christ Jesus, who walk not after the flesh, but after the Spirit.", "For the law of the Spirit of life in Christ Jesus hath made me free from the law of sin and death.", "For what the law could not do, in that it was weak through the flesh, God sending his own Son in the likeness of sinful flesh, and for sin, condemned sin in the flesh:", "That the righteousness of the law might be fulfilled in us, who walk not after the flesh, but after the Spirit.", "For they that are after the flesh do mind the things of the flesh; but they that are after the Spirit the things of the Spirit.", "For to be carnally minded  death; but to be spiritually minded  life and peace.", "Because the carnal mind  enmity against God: for it is not subject to the law of God, neither indeed can be.", "So then they that are in the flesh cannot please God.", "But ye are not in the flesh, but in the Spirit, if so be that the Spirit of God dwell in you. Now if any man have not the Spirit of Christ, he is none of his.", "And if Christ  in you, the body  dead because of sin; but the Spirit  life because of righteousness.", "But if the Spirit of him that raised up Jesus from the dead dwell in you, he that raised up Christ from the dead shall also quicken your mortal bodies by his Spirit that dwelleth in you.", "Therefore, brethren, we are debtors, not to the flesh, to live after the flesh.", "For if ye live after the flesh, ye shall die: but if ye through the Spirit do mortify the deeds of the body, ye shall live.", "For as many as are led by the Spirit of God, they are the sons of God.", "For ye have not received the spirit of bondage again to fear; but ye have received the Spirit of adoption, whereby we cry, Abba, Father.", "The Spirit itself beareth witness with our spirit, that we are the children of God:", "And if children, then heirs; heirs of God, and joint-heirs with Christ; if so be that we suffer with , that we may be also glorified together.", "For I reckon that the sufferings of this present time  not worthy  with the glory which shall be revealed in us.", "For the earnest expectation of the creature waiteth for the manifestation of the sons of God.", "For the creature was made subject to vanity, not willingly, but by reason of him who hath subjected  in hope,", "Because the creature itself also shall be delivered from the bondage of corruption into the glorious liberty of the children of God.", "For we know that the whole creation groaneth and travaileth in pain together until now.", "And not only , but ourselves also, which have the firstfruits of the Spirit, even we ourselves groan within ourselves, waiting for the adoption, , the redemption of our body.", "For we are saved by hope: but hope that is seen is not hope: for what a man seeth, why doth he yet hope for?", "But if we hope for that we see not,  do we with patience wait for .", "Likewise the Spirit also helpeth our infirmities: for we know not what we should pray for as we ought: but the Spirit itself maketh intercession for us with groanings which cannot be uttered.", "And he that searcheth the hearts knoweth what  the mind of the Spirit, because he maketh intercession for the saints according to  God.", "And we know that all things work together for good to them that love God, to them who are the called according to  purpose.", "For whom he did foreknow, he also did predestinate  conformed to the image of his Son, that he might be the firstborn among many brethren.", "Moreover whom he did predestinate, them he also called: and whom he called, them he also justified: and whom he justified, them he also glorified.", "What shall we then say to these things? If God  for us, who  against us?", "He that spared not his own Son, but delivered him up for us all, how shall he not with him also freely give us all things?", "Who shall lay any thing to the charge of God's elect?  God that justifieth.", "Who  he that condemneth?  Christ that died, yea rather, that is risen again, who is even at the right hand of God, who also maketh intercession for us.", "Who shall separate us from the love of Christ?  tribulation, or distress, or persecution, or famine, or nakedness, or peril, or sword?", "As it is written, For thy sake we are killed all the day long; we are accounted as sheep for the slaughter.", "Nay, in all these things we are more than tumblingstone and rock of offence: and whosoever believeth on him shall not be ashamed."], ["Brethren, my heart's desire and prayer to God for Israel is, that they might be saved.", "For I bear them record that they have a zeal of God, but not according to knowledge.", "For they being ignorant of God's righteousness, and going about to establish their own righteousness, have not submitted themselves unto the righteousness of God.", "For Christ  the end of the law for righteousness to every one that believeth.", "For Moses describeth the righteousness which is of the law, That the man which doeth those things shall live by them.", "But the righteousness which is of faith speaketh on this wise, Say not in thine heart, Who shall ascend into heaven? (that is, to bring Christ down :)", "Or, Who shall descend into the deep? (that is, to bring up Christ again from the dead.)", "But what saith it? The word is nigh thee,  in thy mouth, and in thy heart: that is, the word of faith, which we preach;", "That if thou shalt confess with thy mouth the Lord Jesus, and shalt believe in thine heart that God hath raised him from the dead, thou shalt be saved.", "For with the heart man believeth unto righteousness; and with the mouth confession is made unto salvation.", "For the scripture saith, Whosoever believeth on him shall not be ashamed.", "For there is no difference between the Jew and the Greek: for the same Lord over all is rich unto all that call upon him.", "For whosoever shall call upon the name of the Lord shall be saved.", "How then shall they call on him in whom they have not believed? and how shall they believe in him of whom they have not heard? and how shall they hear without a preacher?", "And how shall they preach, except they be sent? as it is written, How beautiful are the feet of them that preach the gospel of peace, and bring glad tidings of good things!", "But they have not all obeyed the gospel. For Esaias saith, Lord, who hath believed our report?", "So then  sins.", "As concerning the gospel,  enemies for your sakes: but as touching the election,  beloved for the fathers' sakes.", "For the gifts and calling of God  without repentance.", "For as ye in times past have not believed God, yet have now obtained mercy through their unbelief:", "Even so have these also now not believed, that through your mercy they also may obtain mercy.", "For God hath concluded them all in unbelief, that he might have mercy upon all.", "O the depth of the riches both of the wisdom and knowledge of God! how unsearchable  his judgments, and his ways past finding out!", "For who hath known the mind of the Lord? or who hath been his counsellor?", "Or who hath first given to him, and it shall be recompensed unto him again?", "For of him, and through him, and to him,  all things: to whom  glory for ever. Amen."], ["I beseech you therefore, brethren, by the mercies of God, that ye present your bodies a living sacrifice, holy, acceptable unto God,  your reasonable service.", "And be not conformed to this world: but be ye transformed by the renewing of your mind, that ye may prove what  that good, and acceptable, and perfect, will of God.", "For I say, through the grace given unto me, to every man that is among you, not to think  more highly than he ought to think; but to think soberly, according as God hath dealt to every man the measure of faith.", "For as we have many members in one body, and all members have not the same office:", "So we,  many, are one body in Christ, and every one members one of another.", "Having then gifts differing according to the grace that is given to us, whether prophecy,  according to the proportion of faith;", "Or ministry,  on  ministering: or he that teacheth, on teaching;", "Or he that exhorteth, on exhortation: he that giveth,  with simplicity; he that ruleth, with diligence; he that sheweth mercy, with cheerfulness.", "love be without dissimulation. Abhor that which is evil; cleave to that which is good.", "kindly affectioned one to another with brotherly love; in honour preferring one another;", "Not slothful in business; fervent in spirit; serving the Lord;", "Rejoicing in hope; patient in tribulation; continuing instant in prayer;", "Distributing to the necessity of saints; given to hospitality.", "Bless them which persecute you: bless, and curse not.", "Rejoice with them that do rejoice, and weep with them that weep.", "of the same mind one toward another. Mind not high things, but condescend to men of low estate. Be not wise in your own conceits.", "Recompense to no man evil for evil. Provide things honest in the sight of all men.", "If it be possible, as much as lieth in you, live peaceably with all men.", "Dearly beloved, avenge not yourselves, but  give place unto wrath: for it is written, Vengeance  mine; I will repay, saith the Lord.", "Therefore if thine enemy hunger, feed him; if he thirst, give him drink: for in so doing thou shalt heap coals of fire on his head.", "Be not overcome of evil, but overcome evil with good."], ["Let every soul be subject unto the higher powers. For there is no power but of God: the powers that be are ordained of God.", "Whosoever therefore resisteth the power, resisteth the ordinance of God: and they that resist shall receive to themselves damnation.", "For rulers are not a terror to good works, but to the evil. Wilt thou then not be afraid of the power? do that which is good, and thou shalt have praise of the same:", "For he is the minister of God to thee for good. But if thou do that which is evil, be afraid; for he beareth not the sword in vain: for he is the minister of God, a revenger to  wrath upon him that doeth evil.", "Wherefore  must needs be subject, not only for wrath, but also for conscience sake.", "For for this cause pay ye tribute also: for they are God's ministers, attending continually upon this very thing.", "Render therefore to all their dues: tribute to whom tribute ; custom to whom custom; fear to whom fear; honour to whom honour.", "Owe no man any thing, but to love one another: for he that loveth another hath fulfilled the law.", "For this, Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not steal, Thou shalt not bear false witness, Thou shalt not covet; and if  any other commandment, it is briefly comprehended in this saying, namely, Thou shalt love thy neighbour as thyself.", "Love worketh no ill to his neighbour: therefore love  the fulfilling of the law.", "And that, knowing the time, that now  high time to awake out of sleep: for now  our salvation nearer than when we believed.", "The night is far spent, the day is at hand: let us therefore cast off the works of darkness, and let us put on the armour of light.", "Let us walk honestly, as in the day; not in rioting and drunkenness, not in chambering and wantonness, not in strife and envying.", "But put ye on the Lord Jesus Christ, and make not provision for the flesh, to  the lusts ."], ["Him that is weak in the faith receive ye,  not to doubtful disputations.", "For one believeth that he may eat all things: another, who is weak, eateth herbs.", "Let not him that eateth despise him that eateth not; and let not him which eateth not judge him that eateth: for God hath received him.", "Who art thou that judgest another man's servant? to his own master he standeth or falleth. Yea, he shall be holden up: for God is able to make him stand.", "One man esteemeth one day above another: another esteemeth every day . Let every man be fully persuaded in his own mind.", "He that regardeth the day, regardeth  unto the Lord; and he that regardeth not the day, to the Lord he doth not regard . He that eateth, eateth to the Lord, for he giveth God thanks; and he that eateth not, to the Lord he eateth not, and giveth God thanks.", "For none of us liveth to himself, and no man dieth to himself.", "For whether we live, we live unto the Lord; and whether we die, we die unto the Lord: whether we live therefore, or die, we are the Lord's.", "For to this end Christ both died, and rose, and revived, that he might be Lord both of the dead and living.", "But why dost thou judge thy brother? or why dost thou set at nought thy brother? for we shall all stand before the judgment seat of Christ.", "For it is written,  I live, saith the Lord, every knee shall bow to me, and every tongue shall confess to God.", "So then every one of us shall give account of himself to God.", "Let us not therefore judge one another any more: but judge this rather, that no man put a stumblingblock or an occasion to fall in  brother's way.", "I know, and am persuaded by the Lord Jesus, that  nothing unclean of itself: but to him that esteemeth any thing to be unclean, to him  unclean.", "But if thy brother be grieved with  meat, now walkest thou not charitably. Destroy not him with thy meat, for whom Christ died.", "Let not then your good be evil spoken of:", "For the kingdom of God is not meat and drink; but righteousness, and peace, and joy in the Holy Ghost.", "For he that in these things serveth Christ  acceptable to God, and approved of men.", "Let us therefore follow after the things which make for peace, and things wherewith one may edify another.", "For meat destroy not the work of God. All things indeed  pure; but  evil for that man who eateth with offence.", "good neither to eat flesh, nor to drink wine, nor  whereby thy brother stumbleth, or is offended, or is made weak.", "Hast thou faith? have  to thyself before God. Happy  he that condemneth not himself in that thing which he alloweth.", "And he that doubteth is damned if he eat, because  not of faith: for whatsoever  not of faith is sin."], ["We then that are strong ought to bear the infirmities of the weak, and not to please ourselves.", "Let every one of us please  neighbour for  good to edification.", "For even Christ pleased not himself; but, as it is written, The reproaches of them that reproached thee fell on me.", "For whatsoever things were written aforetime were written for our learning, that we through patience and comfort of the scriptures might have hope.", "Now the God of patience and consolation grant you to be likeminded one toward another according to Christ Jesus:", "That ye may with one mind  one mouth glorify God, even the Father of our Lord Jesus Christ.", "Wherefore receive ye one another, as Christ also received us to the glory of God.", "Now I say that Jesus Christ was a minister of the circumcision for the truth of God, to confirm the promises  unto the fathers:", "And that the Gentiles might glorify God for  mercy; as it is written, For this cause I will confess to thee among the Gentiles, and sing unto thy name.", "And again he saith, Rejoice, ye Gentiles, with his people.", "And again, Praise the Lord, all ye Gentiles; and laud him, all ye people.", "And again, Esaias saith, There shall be a root of Jesse, and he that shall rise to reign over the Gentiles; in him shall the Gentiles trust.", "Now the God of hope fill you with all joy and peace in believing, that ye may abound in hope, through the power of the Holy Ghost.", "And I myself also am persuaded of you, my brethren, that ye also are full of goodness, filled with all knowledge, able also to admonish one another.", "Nevertheless, brethren, I have written the more boldly unto you in some sort, as putting you in mind, because of the grace that is given to me of God,", "That I should be the minister of Jesus Christ to the Gentiles, ministering the gospel of God, that the offering up of the Gentiles might be acceptable, being sanctified by the Holy Ghost.", "I have therefore whereof I may glory through Jesus Christ in those things which pertain to God.", "For I will not dare to speak of any of those things which Christ hath not wrought by me, to make the Gentiles obedient, by word and deed,", "Through mighty signs and wonders, by the power of the Spirit of God; so that from Jerusalem, and round about unto Illyricum, I have fully preached the gospel of Christ.", "Yea, so have I strived to preach the gospel, not where Christ was named, lest I should build upon another man's foundation:", "But as it is written, To whom he was not spoken of, they shall see: and they that have not heard shall understand.", "For which cause also I have been much hindered from coming to you.", "But now having no more place in these parts, and having a great desire these many years to come unto you;", "Whensoever I take my journey into Spain, I will come to you: for I trust to see you in my journey, and to be brought on my way thitherward by you, if first I be somewhat filled with your .", "But now I go unto Jerusalem to minister unto the saints.", "For it hath pleased them of Macedonia and Achaia to make a certain contribution for the poor saints which are at Jerusalem.", "It hath pleased them verily; and their debtors they are. For if the Gentiles have been made partakers of their spiritual things, their duty is also to minister unto them in carnal things.", "When therefore I have performed this, and have sealed to them this fruit, I will come by you into Spain.", "And I am sure that, when I come unto you, I shall come in the fulness of the blessing of the gospel of Christ.", "Now I beseech you, brethren, for the Lord Jesus Christ's sake, and for the love of the Spirit, that ye strive together with me in  prayers to God for me;", "That I may be delivered from them that do not believe in Judaea; and that my service which  for Jerusalem may be accepted of the saints;", "That I may come unto you with joy by the will of God, and may with you be refreshed.", "Now the God of peace  with you all. Amen."], ["I commend unto you Phebe our sister, which is a servant of the church which is at Cenchrea:", "That ye receive her in the Lord, as becometh saints, and that ye assist her in whatsoever business she hath need of you: for she hath been a succourer of many, and of myself also.", "Greet Priscilla and Aquila my helpers in Christ Jesus:", "Who have for my life laid down their own necks: unto whom not only I give thanks, but also all the churches of the Gentiles.", "Likewise  the church that is in their house. Salute my wellbeloved Epaenetus, who is the firstfruits of Achaia unto Christ.", "Greet Mary, who bestowed much labour on us.", "Salute Andronicus and Junia, my kinsmen, and my fellowprisoners, who are of note among the apostles, who also were in Christ before me.", "Greet Amplias my beloved in the Lord.", "Salute Urbane, our helper in Christ, and Stachys my beloved.", "Salute Apelles approved in Christ. Salute them which are of Aristobulus' .", "Salute Herodion my kinsman. Greet them that be of the  of Narcissus, which are in the Lord.", "Salute Tryphena and Tryphosa, who labour in the Lord. Salute the beloved Persis, which laboured much in the Lord.", "Salute Rufus chosen in the Lord, and his mother and mine.", "Salute Asyncritus, Phlegon, Hermas, Patrobas, Hermes, and the brethren which are with them.", "Salute Philologus, and Julia, Nereus, and his sister, and Olympas, and all the saints which are with them.", "Salute one another with an holy kiss. The churches of Christ salute you.", "Now I beseech you, brethren, mark them which cause divisions and offences contrary to the doctrine which ye have learned; and avoid them.", "For they that are such serve not our Lord Jesus Christ, but their own belly; and by good words and fair speeches deceive the hearts of the simple.", "For your obedience is come abroad unto all . I am glad therefore on your behalf: but yet I would have you wise unto that which is good, and simple concerning evil.", "And the God of peace shall bruise Satan under your feet shortly. The grace of our Lord Jesus Christ  with you. Amen.", "Timotheus my workfellow, and Lucius, and Jason, and Sosipater, my kinsmen, salute you.", "I Tertius, who wrote  epistle, salute you in the Lord.", "Gaius mine host, and of the whole church, saluteth you. Erastus the chamberlain of the city saluteth you, and Quartus a brother.", "The grace of our Lord Jesus Christ  with you all. Amen.", "Now to him that is of power to stablish you according to my gospel, and the preaching of Jesus Christ, according to the revelation of the mystery, which was kept secret since the world began,", "But now is made manifest, and by the scriptures of the prophets, according to the commandment of the everlasting God, made known to all nations for the obedience of faith:", "To God only wise,  glory through Jesus Christ for ever. Amen. \u00ab by Phebe servant of the church at Cenchrea.}\u00bb"]];

var galAudioOpen = false;

var galChapterSelect = document.getElementById('galChapterSelect');
var galCurrentSectionEl = document.getElementById('galCurrentSection');
var galTextDisplay = document.getElementById('galTextDisplay');
var currentGalSectionIdx = -1;

var galTimestamps = [
  { time: 0, label: 'Gal 1:1-10 \u2014 Greeting', chapter: 1, startVerse: 1, endVerse: 10 },
  { time: 89, label: 'Gal 1:11-24 \u2014 Paul Called by God', chapter: 1, startVerse: 11, endVerse: 24 },
  { time: 184, label: 'Gal 2:1-10 \u2014 Paul Accepted by the Apostles', chapter: 2, startVerse: 1, endVerse: 10 },
  { time: 301, label: 'Gal 2:11-21 \u2014 Paul Opposes Peter', chapter: 2, startVerse: 11, endVerse: 21 },
  { time: 408, label: 'Gal 3:1-14 \u2014 By Faith, or by Works of the Law?', chapter: 3, startVerse: 1, endVerse: 14 },
  { time: 538, label: 'Gal 3:15-29 \u2014 The Law and the Promise', chapter: 3, startVerse: 15, endVerse: 29 },
